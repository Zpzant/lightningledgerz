<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="3.75in" height="2.25in" viewBox="0 0 1125 675"
     preserveAspectRatio="xMidYMid meet">
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- Lightning Ledgerz Business Card — BACK                               -->
  <!-- Trim: 3.5" x 2"  |  Bleed: 0.125" all sides  |  Final: 3.75" x 2.25" -->
  <!-- 300 DPI: 1125 × 675 px                                                -->
  <!-- All black text uses #000000 (CMYK 100K when converted)                -->
  <!-- All artwork extends to bleed edges — NO rounded corners                -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&amp;display=swap');
      .black-text { fill: #000000; }
      .gold-text { fill: #b8920a; }
    </style>
  </defs>

  <!-- ── FULL BLEED BACKGROUND (extends to all 4 edges) ── -->
  <rect x="0" y="0" width="1125" height="675" fill="#fffcf8"/>

  <!-- ── Red top bar (bleeds to top edge and both sides) ── -->
  <rect x="0" y="0" width="1125" height="40" fill="#e8231a"/>

  <!-- ── Red bottom bar (bleeds to bottom edge and both sides) ── -->
  <rect x="0" y="635" width="1125" height="40" fill="#e8231a"/>

  <!-- ── LEFT COLUMN SERVICES ── -->
  <text x="80" y="170" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> AUTOMATION
  </text>
  <text x="80" y="290" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> FINANCIAL MODELING
  </text>
  <text x="80" y="410" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> BOOKKEEPING
  </text>
  <text x="80" y="530" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> CASH FLOW ANALYSIS
  </text>

  <!-- ── CENTER LOGO (Lightning Ledgerz transparent PNG, replace with high-res) ── -->
  <image xlink:href="lightning_ledgerz_transparent.png" x="430" y="120" width="265" height="435"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ── RIGHT COLUMN SERVICES ── -->
  <text x="730" y="170" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> BOARDROOM DECKS
  </text>
  <text x="730" y="290" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> FRACTIONAL CFO
  </text>
  <text x="730" y="410" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> BUDGET CREATION
  </text>
  <text x="730" y="530" font-family="Cinzel,serif" font-size="22" font-weight="700" letter-spacing="2" class="black-text">
    <tspan class="gold-text">⚡</tspan> BUDGET vs. ACTUAL
  </text>
</svg>
