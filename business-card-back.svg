<svg xmlns="http://www.w3.org/2000/svg"
     width="3.75in" height="2.25in" viewBox="0 0 1125 675">
  <!-- 3.5x2" business card + 0.125" bleed = 3.75x2.25" at 300dpi -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&amp;display=swap');
    </style>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A44A"/>
      <stop offset="35%" stop-color="#7A5800"/>
      <stop offset="55%" stop-color="#B8920A"/>
      <stop offset="80%" stop-color="#6B4C00"/>
      <stop offset="100%" stop-color="#C9A44A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1125" height="675" fill="#fffcf8"/>

  <!-- Bridge background faded — placeholder -->
  <rect width="1125" height="675" fill="#e8ddd0" opacity="0.12"/>

  <!-- Red top bar (bleeds to edge) -->
  <rect x="0" y="0" width="1125" height="18" fill="#e8231a"/>

  <!-- Red bottom bar (bleeds to edge) -->
  <rect x="0" y="657" width="1125" height="18" fill="#e8231a"/>

  <!-- Left column services -->
  <text x="80" y="100" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628" text-transform="uppercase">
    <tspan fill="#9A7B2E">⚡</tspan> AUTOMATION
  </text>
  <text x="80" y="230" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> FINANCIAL MODELING
  </text>
  <text x="80" y="360" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> BOOKKEEPING
  </text>
  <text x="80" y="490" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> CASH FLOW ANALYSIS
  </text>

  <!-- Center logo placeholder -->
  <rect x="380" y="80" width="365" height="500" fill="none" stroke="#eee" stroke-width="1" stroke-dasharray="6,3" rx="8"/>
  <text x="562" y="320" font-family="Montserrat,sans-serif" font-size="16" fill="#999" text-anchor="middle" font-weight="700">[LOGO]</text>
  <text x="562" y="345" font-family="Montserrat,sans-serif" font-size="11" fill="#bbb" text-anchor="middle">lightning_ledgerz_transparent.png</text>

  <!-- Right column services -->
  <text x="780" y="100" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> BOARDROOM DECKS
  </text>
  <text x="780" y="230" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> FRACTIONAL CFO
  </text>
  <text x="780" y="360" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> BUDGET CREATION
  </text>
  <text x="780" y="490" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1" fill="#0a1628">
    <tspan fill="#9A7B2E">⚡</tspan> BUDGET VS. ACTUAL
  </text>

  <!-- Trim guide -->
  <rect x="37.5" y="37.5" width="1050" height="600" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="8,4"/>
</svg>
