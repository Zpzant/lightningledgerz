<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget. Bookkeep. Build.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

  body {
    margin: 0; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #0a0a0a;
  }
  .text-wrap {
    text-align: center; padding: 60px 80px;
  }
  .tagline {
    font-family: 'Inter', 'Arial Black', sans-serif;
    font-weight: 900; font-size: 52px; letter-spacing: 8px;
    text-transform: uppercase; line-height: 1.1;
    color: #e8e8e8;
    text-shadow:
      0 1px 0 #ccc,
      0 2px 0 #bbb,
      0 3px 0 #aaa,
      0 4px 0 #999,
      0 5px 0 #888,
      0 6px 3px rgba(0,0,0,0.4),
      0 8px 10px rgba(0,0,0,0.3),
      0 12px 20px rgba(0,0,0,0.2);
  }
  .tagline .red {
    color: #e8231a;
    text-shadow:
      0 1px 0 #c01d15,
      0 2px 0 #a8190f,
      0 3px 0 #90150c,
      0 4px 0 #781109,
      0 5px 0 #600d06,
      0 6px 3px rgba(0,0,0,0.4),
      0 8px 10px rgba(0,0,0,0.3),
      0 12px 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
  <div class="text-wrap">
    <div class="tagline">BUDGET. <span class="red">BOOKKEEP.</span> BUILD.</div>
  </div>

</html>
