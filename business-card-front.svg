<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="3.75in" height="2.25in" viewBox="0 0 1125 675"
     preserveAspectRatio="xMidYMid meet">
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- Lightning Ledgerz Business Card — FRONT                              -->
  <!-- Trim: 3.5" x 2"  |  Bleed: 0.125" all sides  |  Final: 3.75" x 2.25" -->
  <!-- 300 DPI: 1125 × 675 px                                                -->
  <!-- All black text uses #000000 (CMYK 100K when converted)                -->
  <!-- All artwork extends to bleed edges — NO rounded corners                -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;family=Cinzel:wght@400;600;700;900&amp;display=swap');
      .black-text { fill: #000000; }
      .red-text { fill: #e8231a; }
      .gold-text { fill: #8a6a1f; }
    </style>
  </defs>

  <!-- ── FULL BLEED BACKGROUND (extends to all 4 edges) ── -->
  <rect x="0" y="0" width="1125" height="675" fill="#fffcf8"/>

  <!-- ── Red left bar (bleeds to top, bottom, and left edges) ── -->
  <rect x="0" y="0" width="55" height="675" fill="#e8231a"/>

  <!-- ── Photo area (1.3" wide = 390px) — printer places high-res zacredtiebest.png ── -->
  <image xlink:href="zacredtiebest.png" x="55" y="0" width="390" height="675"
         preserveAspectRatio="xMidYMid slice"/>

  <!-- ── LIGHTNING LEDGERZ wordmark ── -->
  <text x="475" y="115" font-family="Montserrat,sans-serif" font-size="56" font-weight="900" letter-spacing="3" class="red-text">LIGHTNING</text>
  <text x="475" y="175" font-family="Montserrat,sans-serif" font-size="56" font-weight="900" letter-spacing="3" class="black-text">LEDGER</text>
  <image xlink:href="lightningz.png" x="755" y="125" width="55" height="55"/>

  <!-- ── Tagline ── -->
  <text x="475" y="208" font-family="Montserrat,sans-serif" font-size="22" font-weight="700" letter-spacing="6" class="red-text">BUDGET · BOOKKEEP · BUILD</text>

  <!-- ── Red divider ── -->
  <rect x="475" y="220" width="120" height="6" fill="#e8231a"/>

  <!-- ── Name ── -->
  <text x="475" y="320" font-family="Cinzel,serif" font-size="48" font-weight="700" letter-spacing="3" class="black-text">Zac Prizant</text>

  <!-- ── Title ── -->
  <text x="475" y="358" font-family="Cinzel,serif" font-size="20" font-weight="600" letter-spacing="4" class="gold-text">PRESIDENT &amp; FP&amp;A ADVISOR</text>

  <!-- ── Cornell line ── -->
  <text x="475" y="392" font-family="Cinzel,serif" font-size="20" font-weight="400" letter-spacing="4" class="gold-text">CORNELL MASTERS OF MANAGEMENT</text>
  <image xlink:href="cornred.png" x="950" y="372" width="32" height="32"/>

  <!-- ── Horizontal divider ── -->
  <line x1="475" y1="430" x2="1075" y2="430" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

  <!-- ── Contact info ── -->
  <text x="475" y="478" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="red-text">✉</text>
  <text x="510" y="478" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="black-text">ZPRIZANT@LIGHTNINGLEDGERZ.COM</text>

  <text x="475" y="520" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="red-text">☎</text>
  <text x="510" y="520" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="black-text">(702) 550-2513</text>

  <text x="475" y="562" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="red-text">⊕</text>
  <text x="510" y="562" font-family="Cinzel,serif" font-size="20" font-weight="700" letter-spacing="2" class="black-text">LIGHTNINGLEDGERZ.COM</text>

  <!-- ── QR CODE — placeholder for SVG file you generate at qrcode-monkey.com ── -->
  <!-- Save the downloaded SVG as "business-card-qr.svg" in this folder. -->
  <!-- Then this xlink:href will reference it automatically. -->
  <image xlink:href="business-card-qr.svg" x="940" y="450" width="135" height="135"/>
</svg>
