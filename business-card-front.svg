<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="3.75in" height="2.25in" viewBox="0 0 1125 675">
  <!-- 3.5x2" business card + 0.125" bleed on all sides = 3.75x2.25" at 300dpi = 1125x675px -->
  <!-- Trim area: 37.5px in from each edge (0.125" x 300dpi) -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;family=Cinzel:wght@400;600;700;900&amp;display=swap');
    </style>
    <!-- Clip for photo area -->
    <clipPath id="photo-clip">
      <rect x="18" y="0" width="340" height="675"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1125" height="675" fill="#fffcf8"/>

  <!-- Golden Gate Bridge background (faded) — placeholder rect, printer replaces with high-res image -->
  <rect width="1125" height="675" fill="#e8ddd0" opacity="0.15"/>

  <!-- Red left bar -->
  <rect x="0" y="0" width="18" height="675" fill="#e8231a"/>

  <!-- Photo area (printer places high-res zacredtiebest.png here) -->
  <rect x="18" y="0" width="340" height="675" fill="#f0ebe5" opacity="0.5"/>
  <text x="188" y="350" font-family="Montserrat,sans-serif" font-size="14" fill="#999" text-anchor="middle" font-weight="700">
    [PLACE PHOTO]
  </text>
  <text x="188" y="370" font-family="Montserrat,sans-serif" font-size="10" fill="#bbb" text-anchor="middle">
    zacredtiebest.png
  </text>

  <!-- Info column — starts at x=370 -->

  <!-- LIGHTNING LEDGERZ logo text -->
  <text x="390" y="75" font-family="Montserrat,sans-serif" font-size="48" font-weight="900" letter-spacing="2" fill="#e8231a">LIGHTNING</text>
  <text x="695" y="75" font-family="Montserrat,sans-serif" font-size="48" font-weight="900" letter-spacing="2" fill="#0a1628">LEDGER</text>
  <!-- Z logo placeholder -->
  <text x="1000" y="80" font-family="Montserrat,sans-serif" font-size="12" fill="#999">[Z LOGO]</text>

  <!-- Tagline -->
  <text x="390" y="100" font-family="Montserrat,sans-serif" font-size="21" font-weight="700" letter-spacing="5" fill="#e8231a">BUDGET  ·  BOOKKEEP  ·  BUILD</text>

  <!-- Red divider -->
  <line x1="390" y1="120" x2="490" y2="120" stroke="#e8231a" stroke-width="4"/>

  <!-- Name -->
  <text x="390" y="235" font-family="Cinzel,serif" font-size="42" font-weight="700" letter-spacing="2" fill="#0a1628">Zac Prizant</text>

  <!-- Title — gold gradient approximated -->
  <text x="390" y="270" font-family="Cinzel,serif" font-size="18" font-weight="600" letter-spacing="3.5" fill="#9A7B2E">PRESIDENT &amp; FP&amp;A ADVISOR</text>

  <!-- Cornell line -->
  <text x="390" y="300" font-family="Cinzel,serif" font-size="18" font-weight="400" letter-spacing="3.5" fill="#9A7B2E">CORNELL MASTERS OF MANAGEMENT</text>
  <!-- Cornell logo placeholder -->
  <circle cx="820" cy="294" r="14" fill="none" stroke="#b22222" stroke-width="1.5"/>
  <text x="820" y="298" font-family="serif" font-size="10" fill="#b22222" text-anchor="middle" font-weight="700">C</text>

  <!-- Divider line -->
  <line x1="390" y1="370" x2="1050" y2="370" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Contact info -->
  <!-- Email -->
  <text x="410" y="420" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#e8231a">✉</text>
  <text x="440" y="420" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#0a1628">ZPRIZANT@LIGHTNINGLEDGERZ.COM</text>

  <!-- Phone -->
  <text x="410" y="460" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#e8231a">☎</text>
  <text x="440" y="460" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#0a1628">(702) 550-2513</text>

  <!-- Website -->
  <text x="410" y="500" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#e8231a">⊕</text>
  <text x="440" y="500" font-family="Cinzel,serif" font-size="17" font-weight="700" letter-spacing="1.5" fill="#0a1628">LIGHTNINGLEDGERZ.COM</text>

  <!-- QR Code placeholder (printer places generated QR here) -->
  <rect x="930" y="390" width="130" height="130" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="4"/>
  <text x="995" y="455" font-family="Montserrat,sans-serif" font-size="11" fill="#999" text-anchor="middle" font-weight="700">[QR CODE]</text>
  <text x="995" y="475" font-family="Montserrat,sans-serif" font-size="9" fill="#bbb" text-anchor="middle">qrcode-monkey.com</text>
  <text x="995" y="535" font-family="Montserrat,sans-serif" font-size="9" fill="#e8231a" text-anchor="middle" font-weight="700">SCAN HERE</text>

  <!-- Trim guide (dashed line showing cut area) -->
  <rect x="37.5" y="37.5" width="1050" height="600" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="8,4"/>
</svg>
