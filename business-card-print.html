<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Ledgerz Business Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Cinzel:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d0d0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
    font-family: 'Cinzel', serif;
  }

  /* ── Card: exactly 3.5 × 2 inches ── */
  .card {
    width: 3.5in;
    height: 2in;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    display: flex;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }

  /* Faint watermark logo centered in card */
  .bg-watermark {
    position: absolute;
    left: 62%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1.35in;
    opacity: 0.05;
    z-index: 0;
    pointer-events: none;
    filter: grayscale(100%);
  }

  /* Red left bar */
  .red-bar {
    width: 6px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #e8231a, #a80e08);
    position: relative; z-index: 3;
  }

  /* Photo */
  .photo-col {
    width: 1.45in;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 3;
  }
  .photo-col::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 80% at 60% 80%,
      rgba(232,35,26,0.12) 0%, rgba(232,35,26,0.04) 50%, transparent 75%);
    z-index: 1; pointer-events: none;
  }
  .photo-col img {
    height: 100%; width: auto;
    position: relative; z-index: 2;
  }

  /* Info column */
  .info-col {
    flex: 1;
    padding: 11px 10px 9px 10px;
    display: flex;
    flex-direction: column;
    position: relative; z-index: 3;
  }

  /* ── TOP: Logo + tagline ── */
  .top-block { flex-shrink: 0; }

  .logo-line {
    font-family: 'Montserrat', sans-serif;
    font-size: 19px;
    font-weight: 900;
    letter-spacing: 0.5px;
    line-height: 1;
    text-transform: uppercase;
    display: flex;
    align-items: center;
  }
  .logo-line .l1 { color: #e8231a; margin-right: 4px; }
  .logo-line .l2 { color: #0a1628; }
  .lightning-z {
    height: 21px;
    width: auto;
    flex-shrink: 0;
    margin-left: 2px;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: #e8231a;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Full-width solid red rule */
  .divider {
    height: 2px;
    background: #e8231a;
    margin-top: 5px;
    width: 100%;
  }

  /* ── MIDDLE: Name + title ── */
  .middle-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding-top: 2px;
  }

  .name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a1628;
    letter-spacing: 1px;
    line-height: 1;
  }

  .ceo-line {
    font-family: 'Cinzel', serif;
    font-size: 6px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(160deg, #C9A44A 0%, #7A5800 35%, #B8920A 55%, #6B4C00 80%, #C9A44A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cornell-line {
    font-family: 'Cinzel', serif;
    font-size: 6px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(160deg, #C9A44A 0%, #7A5800 35%, #B8920A 55%, #6B4C00 80%, #C9A44A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cornell-logo {
    height: 10px;
    width: auto;
    flex-shrink: 0;
  }

  /* ── BOTTOM: Contact + QR ── */
  .h-rule {
    flex-shrink: 0;
    height: 1px;
    background: rgba(0,0,0,0.10);
    margin-bottom: 6px;
  }
  .bottom-row {
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
  }

  .contact-block {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 50px;
    flex: 1;
  }

  .citem {
    font-family: 'Cinzel', serif;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 6.5px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: #1a4480;
    text-transform: uppercase;
  }
  .citem .icon {
    color: #e8231a;
    -webkit-text-fill-color: #e8231a;
    font-size: 8px;
    width: 10px;
    text-align: center;
    flex-shrink: 0;
  }

  /* QR with SCAN HERE label */
  .qr-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .qr-img {
    display: block;
    width: 50px;
    height: 50px;
    object-fit: contain;
    border: 1.5px solid #e8231a;
    border-radius: 3px;
    padding: 1px;
  }
  .qr-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 5.5px;
    font-weight: 900;
    color: #e8231a;
    letter-spacing: 1.5px;
    text-align: center;
    margin-top: 2px;
    text-transform: uppercase;
  }

  @media print {
    body { background: white; margin: 0; padding: 0; }
    .card {
      box-shadow: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<div class="card">
  <img class="bg-watermark" src="LightningLedgerzLogo.png" alt="">

  <div class="red-bar"></div>

  <div class="photo-col">
    <img src="zacredtiebest.png" alt="Zac Prizant">
  </div>

  <div class="info-col">

    <div class="top-block">
      <div class="logo-line">
        <span class="l1">LIGHTNING</span><span class="l2">LEDGER</span><img class="lightning-z" src="lightningz.png" alt="Z">
      </div>
      <div class="tagline">Budget &nbsp;·&nbsp; Bookkeep &nbsp;·&nbsp; Build</div>
      <div class="divider"></div>
    </div>

    <div class="middle-block">
      <div class="name">Zac Prizant</div>
      <div class="ceo-line">President &amp; FP&amp;A Advisor</div>
      <div class="cornell-line">Cornell Masters of Management <img class="cornell-logo" src="cornred.png" alt="Cornell"></div>
    </div>

    <div class="h-rule"></div>
    <div class="bottom-row">
      <div class="contact-block">
        <div class="citem"><span class="icon">✉</span> zprizant@lightningledgerz.com</div>
        <div class="citem"><span class="icon">☎</span> (702) 550-2513</div>
        <div class="citem">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#e8231a" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            style="width:10px;height:10px;flex-shrink:0;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          lightningledgerz.com
        </div>
      </div>
      <div class="qr-block">
        <img class="qr-img" src="ledgerzqrcode.png" alt="QR Code">
        <div class="qr-label">Scan Here</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
