<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Ledgerz Business Card — Back</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Cinzel:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #c8c8c8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
  }

  .card-back {
    width: 3.5in; height: 2in;
    border-radius: 10px; overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  }

  .card-back .bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    opacity: 0.22; z-index: 0;
  }
  .card-back .bg-fade {
    position: absolute; inset: 0;
    background: rgba(255,252,248,0.80); z-index: 1;
  }
  .card-back .red-bar-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: linear-gradient(90deg, #e8231a, #a80e08); z-index: 3;
  }
  .card-back .red-bar-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 6px; background: linear-gradient(90deg, #a80e08, #e8231a); z-index: 3;
  }

  /* Full card layout: center-row fills all space above footer */
  .back-inner {
    position: relative; z-index: 2;
    flex: 1;
    display: flex; flex-direction: column;
    padding: 6px 10px 7px 10px;
    justify-content: space-between;
  }

  /* Row: [left col] [logo] [right col] — stretches full height of remaining space */
  .back-center-row {
    flex: 1;
    display: flex; flex-direction: row;
    align-items: stretch;
    justify-content: center;
    gap: 8px;
  }

  /* Logo centered in its column */
  .back-real-logo {
    height: 155px; width: auto;
    flex-shrink: 0;
    align-self: center;
  }

  /* Service columns stretch full height, items spread evenly top to bottom */
  .back-svc-col {
    display: flex; flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .svc {
    font-family: 'Cinzel', serif;
    display: flex; align-items: center; gap: 3px;
    font-size: 5.5px; font-weight: 700;
    letter-spacing: 0.4px; text-transform: uppercase; color: #0a1628;
    white-space: nowrap;
  }
  .svc .bolt {
    font-size: 5.5px;
    background: linear-gradient(160deg, #C9A44A 0%, #B8920A 55%, #C9A44A 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    flex-shrink: 0;
  }

  /* Footer — bumped up font so it's actually visible */
  .back-footer {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; flex-shrink: 0;
  }

  .back-citem {
    font-family: 'Cinzel', serif;
    display: flex; align-items: center; gap: 3px;
    font-size: 5.5px; font-weight: 700;
    letter-spacing: 0.4px; color: #0a1628; text-transform: uppercase;
    white-space: nowrap;
  }
  .back-citem .icon {
    color: #e8231a; -webkit-text-fill-color: #e8231a;
    font-size: 7px; width: 8px; text-align: center; flex-shrink: 0;
  }
  .back-sep {
    color: rgba(0,0,0,0.25);
    font-size: 8px; line-height: 1;
  }

  @media print {
    body { background: white; margin: 0; padding: 0; }
    .card-back {
      box-shadow: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<div class="card-back">
  <img class="bg-img" src="Screenshot 2026-02-27 145907.png" alt="">
  <div class="bg-fade"></div>
  <div class="red-bar-top"></div>
  <div class="red-bar-bottom"></div>

  <div class="back-inner">
    <div class="back-center-row">

      <!-- Left services — evenly spaced top to bottom -->
      <div class="back-svc-col">
        <div class="svc"><span class="bolt">⚡</span> Automation</div>
        <div class="svc"><span class="bolt">⚡</span> Financial Modeling</div>
        <div class="svc"><span class="bolt">⚡</span> Bookkeeping</div>
        <div class="svc"><span class="bolt">⚡</span> Cash Flow Analysis</div>
      </div>

      <!-- Center logo -->
      <img src="lightning_ledgerz_transparent.png" class="back-real-logo" alt="Lightning Ledgerz">

      <!-- Right services — evenly spaced top to bottom -->
      <div class="back-svc-col">
        <div class="svc"><span class="bolt">⚡</span> Boardroom Decks</div>
        <div class="svc"><span class="bolt">⚡</span> Fractional CFO</div>
        <div class="svc"><span class="bolt">⚡</span> Budget Creation</div>
        <div class="svc"><span class="bolt">⚡</span> Budget vs. Actual</div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
