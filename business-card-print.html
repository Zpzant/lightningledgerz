<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Ledgerz Business Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Cinzel:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
  }

  /* ── Card: exactly 3.5 × 2 inches ── */
  .card {
    width: 3.5in;
    height: 2in;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    display: flex;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  /* Golden Gate — slightly more visible than back */
  .bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    opacity: 0.26;
    z-index: 0;
  }
  .bg-fade {
    position: absolute; inset: 0;
    background: rgba(255, 252, 248, 0.82);
    z-index: 1;
  }

  /* Red left bar */
  .red-bar {
    width: 6px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #e8231a, #a80e08);
    position: relative; z-index: 3;
  }

  /* White right bar — mirrors red bar */
  .white-bar {
    width: 10px;
    flex-shrink: 0;
    background: #ffffff;
    position: relative; z-index: 3;
  }

  /* Photo */
  .photo-col {
    width: 1.2in;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    z-index: 3;
  }
  .photo-col::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 90% at 55% 70%,
      rgba(232,35,26,0.22) 0%, rgba(232,35,26,0.08) 50%, transparent 75%);
    z-index: 1; pointer-events: none;
  }
  .photo-col img {
    height: 100%; width: auto;
    margin-left: 6px;
    position: relative; z-index: 2;
  }

  /* Info column — 3-zone flex layout */
  .info-col {
    flex: 1;
    padding: 12px 0 10px 2px;
    margin-left: -4px;
    display: flex;
    flex-direction: column;
    position: relative; z-index: 3;
  }

  /* ── TOP ZONE: Lightning Ledgerz branding ── */
  .top-block { flex-shrink: 0; }

  .logo-line {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    width: 100%;
  }
  .lightning-z {
    height: 16px;
    width: auto;
    flex-shrink: 0;
    margin-left: auto;
    margin-right: 0;
  }
  .logo-line .l1 { color: #e8231a; margin-right: 5px; }
  .logo-line .l2 { color: #0a1628; }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 7px;
    font-weight: 700;
    color: #e8231a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .divider {
    width: 34px; height: 2px;
    background: linear-gradient(90deg, #e8231a, transparent);
    margin: 6px 0 0;
  }

  /* ── MIDDLE ZONE: Name + title — vertically centered ── */
  .middle-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
  }

  /* Cinzel for name, Paul Allen color kept dark navy */
  .name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    color: #0a1628;
    letter-spacing: 1px;
    line-height: 1;
  }

  /* Cinzel + glossy dark gold for lines below name */
  .ceo-line {
    font-family: 'Cinzel', serif;
    font-size: 5.8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: linear-gradient(160deg, #C9A44A 0%, #7A5800 35%, #B8920A 55%, #6B4C00 80%, #C9A44A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cornell-line {
    font-family: 'Cinzel', serif;
    font-size: 5.8px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    background: linear-gradient(160deg, #C9A44A 0%, #7A5800 35%, #B8920A 55%, #6B4C00 80%, #C9A44A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cornell-logo {
    height: 9px;
    width: auto;
    flex-shrink: 0;
  }

  /* ── BOTTOM ZONE: Contact + QR ── */
  .h-rule {
    height: 1px;
    background: rgba(0,0,0,0.08);
    margin-bottom: 5px;
  }
  .bottom-row {
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .contact-block {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 48px;
  }

  .citem {
    font-family: 'Cinzel', serif;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 5.8px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: #0a1628;
    text-transform: uppercase;
  }
  .citem .icon {
    color: #e8231a;
    -webkit-text-fill-color: #e8231a;
    font-size: 7px;
    width: 9px;
    text-align: center;
    flex-shrink: 0;
  }

  /* QR — no background, sits flat */
  .qr-img {
    display: block;
    width: 48px;
    height: 48px;
    object-fit: contain;
    object-position: right center;
    flex-shrink: 0;
  }

  @media print {
    body { background: white; margin: 0; padding: 0; }
    .card {
      box-shadow: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
<body>

<div class="card">
  <img class="bg-img" src="Screenshot 2026-02-27 145907.png" alt="">
  <div class="bg-fade"></div>

  <div class="red-bar"></div>

  <div class="photo-col">
    <img src="zacredtiebest.png" alt="Zac Prizant">
  </div>

  <div class="info-col">

    <!-- TOP: brand -->
    <div class="top-block">
      <div class="logo-line">
        <span class="l1">LIGHTNING</span><span class="l2">LEDGER</span><img class="lightning-z" src="lightningz.png" alt="Z">
      </div>
      <div class="tagline">Budget &nbsp;·&nbsp; Bookkeep &nbsp;·&nbsp; Build</div>
      <div class="divider"></div>
    </div>

    <!-- MIDDLE: name + title centered -->
    <div class="middle-block">
      <div class="name">Zac Prizant</div>
      <div class="ceo-line">President &amp; FP&amp;A Advisor</div>
      <div class="cornell-line">Cornell Masters of Management <img class="cornell-logo" src="cornred.png" alt="Cornell"></div>
    </div>

    <!-- BOTTOM: contact + QR -->
    <div class="h-rule"></div>
    <div class="bottom-row">
      <div class="contact-block">
        <div class="citem"><span class="icon">✉</span> zprizant@lightningledgerz.com</div>
        <div class="citem"><span class="icon">☎</span> (702) 550-2513</div>
        <div class="citem">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#e8231a" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            style="width:9px;height:9px;flex-shrink:0;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          lightningledgerz.com
        </div>
      </div>
      <img class="qr-img" src="ledgerzqrcode.png" alt="Scan QR Code">
    </div>

  </div>
  <div class="white-bar"></div>
</div>

</body>
</html>
